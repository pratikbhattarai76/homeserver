services:
  proxy:
    container_name: proxy
    image: jc21/nginx-proxy-manager:2.14.0
    restart: unless-stopped
#    ports:
#      - '80:80'
#      - '81:81'
#      - '443:443'
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - docker-proxy
      - docker-cloudflared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  docker-proxy:
    external: true

  docker-cloudflared:
    external: true
