version: '3.8'
services:
  proxy:
    container_name: proxy
    image: 'jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - docker-proxy
      - docker-cloudflared

networks:
  docker-proxy:
    external: true

  docker-cloudflared:
    external: true
