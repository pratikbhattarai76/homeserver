- name: Setup the new server
  hosts: homelab
  become: true

  collections:
    - community.docker

  vars:
    server_user: pratikserver
    docker_path: /home/pratikserver/docker
    scripts_path: /home/pratikserver/scripts

  tasks:
    # Updating Server and Installing Packages
    - name: Update apt package cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present

    # Mounting the HDD
    - name: Create mount point directory
      ansible.builtin.file:
        path: /mnt/storage
        state: directory
        mode: "0755"

    - name: Mount storage disk using UUID
      ansible.builtin.mount:
        path: /mnt/storage
        src: UUID=4250e634-f248-4591-b2b0-6d12919f6c8e
        fstype: ext4
        opts: defaults
        state: mounted

    - name: Ensure correct ownership of storage
      ansible.builtin.file:
        path: /mnt/storage
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
        recurse: yes

    # Adding Docker Official Key and Installing Docker
    - name: Create Docker GPG key directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.sources
        content: |
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: {{ ansible_facts['distribution_release'] }}
          Components: stable
          Signed-By: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Update apt cache after adding Docker repo
      ansible.builtin.apt:
        update_cache: yes

    - name: Install Docker Engine and plugins
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure Docker is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Ensure docker group exists
      ansible.builtin.group:
        name: docker
        state: present

    - name: Add server user to docker group
      ansible.builtin.user:
        name: "{{ server_user }}"
        groups: docker
        append: yes

    # Create Docker networks
    - name: Create docker_proxy network
      community.docker.docker_network:
        name: docker-proxy
        driver: bridge
        state: present

    - name: Create docker_cloudflare network
      community.docker.docker_network:
        name: docker-cloudflared
        driver: bridge
        state: present

    # Creating Directories for Docker and Script files
    - name: Create docker directory
      ansible.builtin.file:
        path: "{{ docker_path }}"
        state: directory
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
        mode: "0755"

    - name: Create scripts directory
      ansible.builtin.file:
        path: "{{ scripts_path }}"
        state: directory
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
        mode: "0755"

    - name: Add cron job for update-portfolio script
      ansible.builtin.cron:
        name: "Run update-portfolio script every 30 minutes"
        user: "{{ server_user }}"
        minute: "*/30"
        job: "{{ scripts_path }}/update-portfolio.sh"
