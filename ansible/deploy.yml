- name: Deploy services
  hosts: homelab
  become: true

  vars:
    portfolio_path: /home/pratikserver/docker/portfolio

  tasks:
    # Portfolio App
    - name: Verify portfolio directory exists
      stat:
        path: "{{ portfolio_path }}"
      register: portfolio_directory_record

    - name: Fail if portfolio directory is missing
      fail:
        msg: "Portfolio directory not found at {{ portfolio_path }}"
      when: not portfolio_directory_record.stat.exists

    - name: Verify portfolio compose file exists
      stat:
        path: "{{ portfolio_path }}/docker-compose.yml"
      register: portfolio_compose_record

    - name: Fail if portfolio compose file is missing
      fail:
        msg: "Portfolio docker-compose.yml not found at {{ portfolio_path }}"
      when: not portfolio_compose_record.stat.exists

    - name: Verify portfolio env file exists
      stat:
        path: "{{ portfolio_path }}/.env"
      register: portfolio_env_file

    - name: Fail if portfolio env file is missing
      fail:
        msg: "Portfolio .env file not found at {{ portfolio_path }}"
      when: not portfolio_env_file.stat.exists

    - name: Pull latest portfolio image
      command: docker compose pull
      args:
        chdir: "{{ portfolio_path }}"

    - name: Start portfolio
      command: docker compose up -d
      args:
        chdir: "{{ portfolio_path }}"
