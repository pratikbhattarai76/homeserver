- name: Deploy cloudflared
  hosts: homelab
  become: true

  vars:
    cloudflared_path: /home/pratikserver/docker/cloudflared

  tasks:
    - name: Check directory exists
      stat:
        path: "{{ cloudflared_path }}"
      register: directory_register_record

    - name: Fail if directory missing
      fail:
        msg: "Cloudflared directory not found"
      when: not directory_register_record.stat.exists

    - name: Check docker-compose.yml exists
      stat:
        path: "{{ cloudflared_path }}/docker-compose.yml"
      register: compose_register_record

    - name: Fail if docker-compose.yml missing
      fail:
        msg: "Cloudflared docker-compose.yml missing"
      when: not compose_register_record.stat.exists

    - name: Check .env exists
      stat:
        path: "{{ cloudflared_path }}/.env"
      register: env_register_record

    - name: Fail if .env missing
      fail:
        msg: "Cloudflared .env missing"
      when: not env_register_record.stat.exists

    - name: Pull latest image
      command: docker compose pull
      args:
        chdir: "{{ cloudflared_path }}"

    - name: Start/update container
      command: docker compose up -d
      args:
        chdir: "{{ cloudflared_path }}"
