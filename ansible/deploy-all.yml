- name: Deploy services
  hosts: homelab
  become: true

  vars:
    services:
      - name: cloudflared
        path: /home/pratikserver/docker/cloudflared
        needs_env: true

      - name: monitoring
        path: /home/pratikserver/docker/monitoring
        needs_env: true

      - name: nextcloud
        path: /home/pratikserver/docker/nextcloud
        needs_env: true

      - name: portfolio
        path: /home/pratikserver/docker/portfolio
        needs_env: true

      - name: nginx-proxy-manager
        path: /home/pratikserver/docker/nginx-proxy-manager
        needs_env: false

      - name: portainer
        path: /home/pratikserver/docker/portainer
        needs_env: false

      - name: uptime-kuma
        path: /home/pratikserver/docker/uptime-kuma
        needs_env: false

      - name: vaultwarden
        path: /home/pratikserver/docker/vaultwarden
        needs_env: false

  tasks:
    # Verify service directories and fail if missing
    - name: Verify service directories exist
      stat:
        path: "{{ item.path }}"
      register: service_directory_register_record
      loop: "{{ services }}"

    - name: Fail if service directory is missing
      fail:
        msg: "Service directory missing: {{ item.item.path }}"
      when: not item.stat.exists
      loop: "{{ service_directory_register_record.results }}"

    # Verify docker-compose files and fail if missing
    - name: Verify docker-compose files exist
      stat:
        path: "{{ item.path }}/docker-compose.yml"
      register: compose_file_register_record
      loop: "{{ services }}"

    - name: Fail if docker-compose.yml is missing
      fail:
        msg: "docker-compose.yml missing in {{ item.item.path }}"
      when: not item.stat.exists
      loop: "{{ compose_file_register_record.results }}"

    # Verify required .env files and fail if missing
    - name: Verify .env files for services that require them
      stat:
        path: "{{ item.path }}/.env"
      register: env_file_register_record
      loop: "{{ services }}"
      when: item.needs_env

    - name: Fail if required .env file is missing
      fail:
        msg: ".env missing in {{ item.item.path }}"
      when:
        - item.item.needs_env
        - not item.stat.exists
      loop: "{{ env_file_register_record.results }}"

    # Pull latest images and start/update services
    - name: Pull latest images
      command: docker compose pull
      args:
        chdir: "{{ item.path }}"
      loop: "{{ services }}"

    - name: Start/update
      command: docker compose up -d
      args:
        chdir: "{{ item.path }}"
      loop: "{{ services }}"
