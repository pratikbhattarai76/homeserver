# This is the third step where all of my services are ran in the server. Each service uses the shared deploy-service.yml task file. Tags let me target a single service from the command line, for example: ansible-playbook -i inventory.ini deploy-all.yml --tags monitoring


- name: Deploy services
  hosts: homelab
  become: true

  tasks:
    - name: Deploy cloudflared
      import_tasks: deploy-service.yml
      vars:
        service_name: cloudflared
        service_path: /home/pratikserver/docker/cloudflared
        service_needs_env: true
      tags:
        - cloudflared

    - name: Deploy monitoring
      import_tasks: deploy-service.yml
      vars:
        service_name: monitoring
        service_path: /home/pratikserver/docker/monitoring
        service_needs_env: true
      tags:
        - monitoring

    - name: Deploy nextcloud
      import_tasks: deploy-service.yml
      vars:
        service_name: nextcloud
        service_path: /home/pratikserver/docker/nextcloud
        service_needs_env: true
      tags:
        - nextcloud

    - name: Deploy portfolio
      import_tasks: deploy-service.yml
      vars:
        service_name: portfolio
        service_path: /home/pratikserver/docker/portfolio
        service_needs_env: true
      tags:
        - portfolio

    - name: Deploy nginx-proxy-manager
      import_tasks: deploy-service.yml
      vars:
        service_name: nginx-proxy-manager
        service_path: /home/pratikserver/docker/nginx-proxy-manager
        service_needs_env: false
      tags:
        - nginx-proxy-manager

    - name: Deploy uptime-kuma
      import_tasks: deploy-service.yml
      vars:
        service_name: uptime-kuma
        service_path: /home/pratikserver/docker/uptime-kuma
        service_needs_env: false
      tags:
        - uptime-kuma

    - name: Deploy vaultwarden
      import_tasks: deploy-service.yml
      vars:
        service_name: vaultwarden
        service_path: /home/pratikserver/docker/vaultwarden
        service_needs_env: false
      tags:
        - vaultwarden

    - name: Deploy gotify
      import_tasks: deploy-service.yml
      vars:
        service_name: gotify
        service_path: /home/pratikserver/docker/gotify
        service_needs_env: false
      tags:
        - gotify
